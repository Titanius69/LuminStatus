# ---------------------------------------------------------------------------
#  LuminStatus
#
#  A public status page generated by the proxy. Servers are discovered from
#  velocity.toml automatically, so this file is optional: the defaults below
#  produce a working page with no edits at all.
#
#  Reload after editing with /luminstatus reload.
# ---------------------------------------------------------------------------

page {
  # Shown as the page title and as the Discord webhook username.
  title = "Network Status"

  # One line under the title, and the meta description for search engines.
  tagline = "Live availability of every server on the network."

  # Where the page will be reachable once published. Used for the Atom feed's
  # canonical links. Leave empty if you do not publish it yet.
  public-url = ""

  # Optional link shown to players who need more help. Leave empty to hide it.
  support-url = ""

  footer = "Powered by LuminStatus"
}

monitoring {
  # How often each backend is pinged. Thirty seconds is plenty; the proxy also
  # learns about failures for free whenever it routes a real player.
  interval-seconds = 30

  # How long a single ping may take before it counts as a failure.
  timeout-seconds = 5

  # A server has to fail this many checks in a row before the page calls it
  # down. This is the flapping guard: one dropped packet is not an outage.
  failure-threshold = 3

  # How many good checks in a row are needed before it is called healthy again.
  recovery-threshold = 2

  # "Degraded" is relative to each server's own median latency, not an absolute
  # number, because normal latency differs per host. A server is degraded when
  # it responds slower than (median x this value).
  degraded-multiplier = 3.0

  # How many samples the median is taken over.
  baseline-samples = 60

  # Count connection failures observed while routing real players. Free, and it
  # reacts faster than the poll interval.
  passive-checks = true
}

# The plugin can serve the page itself. Off by default: many hosts do not allow
# a second open port, and a status page hosted on the machine that just went
# down is not a status page. Prefer static-export below.
http {
  enabled = false
  bind-address = "0.0.0.0"
  port = 8080
  worker-threads = 2
}

# Writes index.html, status.json and feed.atom into a directory. Point a web
# server at it, sync it to object storage, or commit it to a GitHub Pages repo
# with a two-line cron job. This is the recommended setup: the page survives the
# proxy going down.
static-export {
  enabled = true

  # Relative to plugins/luminstatus/, or an absolute path.
  directory = "public"

  interval-seconds = 60
}

discord {
  enabled = false
  webhook-url = ""

  # A server has to stay in its new state this long before anything is posted.
  # Set to 0 to post immediately, at the cost of noise during brief blips.
  min-duration-seconds = 120

  # Prepended to outage and incident posts, e.g. "<@&123456789012345678>".
  # Leave empty for no ping.
  mention = ""
}

history {
  # How many days the uptime ribbon covers. Storage is a few kilobytes per
  # server per year, so raising this is cheap.
  retention-days = 90
}

update-checker {
  enabled = true

  # Your SpigotMC resource id, the number in the resource URL. Set to 0 to
  # disable the check entirely.
  resource-id = 137265

  interval-hours = 6
}

# Optional per-server presentation. Keys are the server names from
# velocity.toml. Anything not listed here is shown under its own name in a
# group called "Network".
#
# Never expose an internal host name here: this page is public.
components {
  # lobby-1 {
  #   display-name = "Lobby"
  #   group = "Core"
  #   hidden = false
  # }
  #
  # survival-1 {
  #   display-name = "Survival"
  #   group = "Gamemodes"
  # }
  #
  # dev {
  #   hidden = true
  # }
}
